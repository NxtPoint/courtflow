# render.yaml — CourtFlow / NextPoint platform blueprint.
#
# Env discipline ported from 1050 (decision D6, docs/10 §8):
#   - secrets are `sync: false` (filled in the Render dashboard, never committed)
#   - go-live flags are committed INLINE so a blueprint sync can't wipe them
#   - the public Clerk publishable key is inline (browser-exposed by design)
# DROPPED from 1050: all ingest/video/Batch/GPU services and their env.
#
# IMPORTANT (docs/CLAUDE.md gotcha): api.nextpointtennis.com is LIVE on the 1050
# service. This platform gets its OWN API host (e.g. api.courtflow.app), set via the
# Render dashboard custom domain — NOT here (changing a custom domain can recreate a
# service). Service `name`s are new slugs (no collision with 1050's blueprint).

services:
  # =========================================
  # 1) courtflow-api — booking/diary/billing API (Flask + Gunicorn)
  # =========================================
  - type: web
    name: courtflow-api
    env: python
    plan: starter       # never sleeps (no cold starts). Bumped 2026-07 to match the live dashboard plan.
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    # 120s timeout (no long ML jobs here, unlike 1050's 1800s).
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      # --- Database (new Postgres for the platform) ---
      - key: DATABASE_URL
        sync: false

      # --- Server-to-server / cron / admin guard (replaces 1050 CLIENT_API_KEY client path) ---
      - key: OPS_KEY
        sync: false

      # --- Auth: per-user IdP — NEW CourtFlow Clerk DEV app (settling-alien-23), created
      # 2026-06-20. (The reused 1050 production Clerk was domain-locked to ten-fifty5 hosts
      # and rejected the onrender origin; a dev instance's pk_test key works on any origin.)
      # Session token carries an `email` claim; default tokens set `iss` not `aud` (AUTH_AUDIENCE
      # blank). Public values, committed inline. LIVE. Swap to a production instance + custom
      # domain when nextpointtennis.com cuts over.
      - key: AUTH_ENABLED
        value: "1"
      - key: AUTH_PROVIDER
        value: "clerk"
      - key: AUTH_JWKS_URL
        value: "https://settling-alien-23.clerk.accounts.dev/.well-known/jwks.json"
      - key: AUTH_ISSUER
        value: "https://settling-alien-23.clerk.accounts.dev"
      - key: AUTH_AUDIENCE
        value: ""            # blank — Clerk default session tokens set no aud

      # Signup gift: a free week of COURT bookings (a time-boxed trial membership granted on
      # first login). Reuses the membership engine (courts-only, auto-lapses). 0 disables.
      - key: SIGNUP_TRIAL_DAYS
        value: "7"

      # --- Payments: provider-agnostic, LIVE (Yoco). Global gate = PAYMENTS_ENABLED=1;
      # per-club gate = club.policy.allow_online_payment (Settings → Payments toggle). A club
      # only takes online payments when BOTH are on — so this is safe globally while each club
      # opts in. Yoco hosted checkout gives card + Apple/Google/Samsung Pay automatically. ---
      - key: PAYMENTS_ENABLED
        value: "1"
      - key: PAYMENTS_PROVIDER     # which adapter the /api/billing/config probe advertises
        value: "yoco"
      - key: YOCO_SECRET_KEY       # sk_live_… (server-side checkout + refund calls)
        sync: false
      - key: YOCO_PUBLIC_KEY       # pk_live_… (publishable; surfaced by /api/billing/config)
        sync: false
      - key: YOCO_WEBHOOK_SECRET   # whsec_… (Standard-Webhooks signing secret)
        sync: false
      # Origin of the courtflow-web portal that serves /pay-return.html (Yoco return URLs).
      # Update to the real domain at DNS cutover.
      - key: APP_BASE_URL
        value: "https://courtflow-web.onrender.com"

      # --- CRM / Klaviyo (one Klaviyo, NextPoint brand — decision D3). Tracking + consent are
      # always-on in code; CRM sync SELF-GATES on KLAVIYO_API_KEY (no key = silent no-op), so there
      # are no *_ENABLED flags to manage — just add the key when Klaviyo work begins. ---
      - key: KLAVIYO_API_KEY
        sync: false

      # --- AWS S3 (assets) + SES (transactional email) ---
      # SES: verify ONE CourtFlow domain (courtflow.app) in af-south-1 (DKIM + SPF), then SES_SENDER
      # is a bare no-reply@courtflow.app. Per-club From-name (club.name) + Reply-To (club location
      # email) are added in code, so adding a club needs NO new SES work. Exit the SES sandbox
      # (request production access) before real members receive mail. Setup: docs/specs/SES-SETUP.md.
      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: "af-south-1"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SES_SENDER            # INTERIM: 1050's verified noreply@ten-fifty5.com; LATER: no-reply@courtflow.app
        sync: false                # (code also reads SES_FROM_EMAIL, so 1050's env copies over verbatim)
      # SES-only creds + region — let email ride a DIFFERENT AWS account from S3. INTERIM go-live:
      # copy these straight from the 1050 (ten-fifty5) Render service — that SES account is already
      # verified + out of sandbox (it sends coach invites to external emails). Branded "NextPoint
      # Tennis" via per-club From-name. Swap to CourtFlow's own account post-reset. Unset => AWS_* chain.
      - key: SES_AWS_ACCESS_KEY_ID     # = 1050's AWS_ACCESS_KEY_ID
        sync: false
      - key: SES_AWS_SECRET_ACCESS_KEY # = 1050's AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SES_REGION               # = 1050's ACTUAL AWS_REGION (likely eu-north-1 — copy it, don't guess)
        value: ""

  # =========================================
  # 2) courtflow-web — host-switched marketing site + portal SPAs (NO DB)
  #    Per-club theming by host reads club.branding (mirrors 1050 locker_room_app).
  #    Custom domains (nextpointtennis.com etc.) attached via the Render dashboard.
  # =========================================
  - type: web
    name: courtflow-web
    env: python
    plan: starter       # never sleeps (no cold starts). Bumped 2026-07 to match the live dashboard plan.
    buildCommand: "pip install --upgrade pip && pip install flask gunicorn requests"
    startCommand: "gunicorn web_wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      # The /login page (Clerk widget). DARK until AUTH_ENABLED=1 + key set.
      - key: AUTH_ENABLED
        value: "1"
      - key: CLERK_PUBLISHABLE_KEY
        value: "pk_test_c2V0dGxpbmctYWxpZW4tMjMuY2xlcmsuYWNjb3VudHMuZGV2JA"  # CourtFlow Clerk dev app; public
      - key: AUTH_AFTER_LOGIN_URL
        value: "/portal"
      # Backend that verifies the Clerk token from /login (the whoami check).
      - key: AUTH_API_BASE
        value: "https://courtflow-api.onrender.com"
      # Marketing hosts → these serve the public site at "/" (app stays at /portal).
      # Includes the onrender URL so the public site is viewable before DNS cutover;
      # the real domains are here too (also in branding.py registry) for go-live.
      - key: MARKETING_HOSTS
        value: "courtflow-web.onrender.com,nextpointtennis.com,www.nextpointtennis.com"
      # --- Google marketing tags (go-live cutover §5). All DARK until filled at cutover.
      # Values are PUBLIC (they appear in page source), so committed inline (blank) not sync:false.
      # GA4 + Ads inject via web_app._inject_head; conversions fire through window.cfConversion.
      - key: GA4_MEASUREMENT_ID          # G-XXXXXXXXXX  (GA4 web stream)
        value: ""
      - key: GOOGLE_ADS_ID               # AW-XXXXXXXXXX (Google Ads global tag)
        value: ""
      - key: GOOGLE_ADS_CONVERSIONS      # JSON {"purchase":"AW-123/abcXYZ","sign_up":"AW-123/defQRS"}
        value: ""
      # Search Console verification — set EITHER the HTML-file name OR the meta token.
      - key: GSC_VERIFICATION_FILE       # e.g. google1234abcd.html (served at that path)
        value: ""
      - key: GSC_META_TOKEN              # <meta google-site-verification content=...> alternative
        value: ""

  # =========================================
  # Crons — DEFERRED (not created at launch; nothing depends on them yet).
  # Each only matters once its feature is live: reminders (sending booking reminders),
  # capacity-sweep (releasing online-payment holds + promoting waitlists), monthly-invoice
  # (month-end account statements), membership-refill (recurring memberships). Add them back
  # by uncommenting when those features ship — the handlers + crons/trigger.py already exist.
  # Render crons run `python -m crons.trigger <job>` with CRON_API_BASE + OPS_KEY set.

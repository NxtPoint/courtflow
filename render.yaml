# render.yaml — CourtFlow / NextPoint platform blueprint.
#
# Env discipline ported from 1050 (decision D6, docs/10 §8):
#   - secrets are `sync: false` (filled in the Render dashboard, never committed)
#   - go-live flags are committed INLINE so a blueprint sync can't wipe them
#   - the public Clerk publishable key is inline (browser-exposed by design)
# DROPPED from 1050: all ingest/video/Batch/GPU services and their env.
#
# IMPORTANT (docs/CLAUDE.md gotcha): api.nextpointtennis.com is LIVE on the 1050
# service. This platform gets its OWN API host (e.g. api.courtflow.app), set via the
# Render dashboard custom domain — NOT here (changing a custom domain can recreate a
# service). Service `name`s are new slugs (no collision with 1050's blueprint).

services:
  # =========================================
  # 1) courtflow-api — booking/diary/billing API (Flask + Gunicorn)
  # =========================================
  - type: web
    name: courtflow-api
    env: python
    plan: free          # pre-launch = $0 (sleeps when idle, ~30s cold start). Bump to "starter" at go-live.
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    # 120s timeout (no long ML jobs here, unlike 1050's 1800s).
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"

      # --- Database (new Postgres for the platform) ---
      - key: DATABASE_URL
        sync: false

      # --- Server-to-server / cron / admin guard (replaces 1050 CLIENT_API_KEY client path) ---
      - key: OPS_KEY
        sync: false

      # --- Auth: per-user IdP — NEW CourtFlow Clerk DEV app (settling-alien-23), created
      # 2026-06-20. (The reused 1050 production Clerk was domain-locked to ten-fifty5 hosts
      # and rejected the onrender origin; a dev instance's pk_test key works on any origin.)
      # Session token carries an `email` claim; default tokens set `iss` not `aud` (AUTH_AUDIENCE
      # blank). Public values, committed inline. LIVE. Swap to a production instance + custom
      # domain when nextpointtennis.com cuts over.
      - key: AUTH_ENABLED
        value: "1"
      - key: AUTH_PROVIDER
        value: "clerk"
      - key: AUTH_JWKS_URL
        value: "https://settling-alien-23.clerk.accounts.dev/.well-known/jwks.json"
      - key: AUTH_ISSUER
        value: "https://settling-alien-23.clerk.accounts.dev"
      - key: AUTH_AUDIENCE
        value: ""            # blank — Clerk default session tokens set no aud

      # --- Payments: provider-agnostic, OFF at launch (decision D8). ---
      - key: PAYMENTS_ENABLED
        value: "0"
      - key: YOCO_ENABLED
        value: "0"
      - key: YOCO_SECRET_KEY
        sync: false
      - key: YOCO_WEBHOOK_SECRET
        sync: false

      # --- CRM / Klaviyo (one Klaviyo, NextPoint brand — decision D3). ---
      - key: TRACKING_ENABLED      # core.usage_event + page-view beacon
        value: "1"
      - key: CONSENT_ENABLED       # consent capture endpoints + screens
        value: "1"
      - key: CRM_SYNC_ENABLED      # forward to Klaviyo (self-gates on KLAVIYO_API_KEY)
        value: "0"
      - key: KLAVIYO_API_KEY
        sync: false

      # --- AWS S3 (assets) + SES (transactional fallback to Klaviyo) ---
      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: "af-south-1"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SES_SENDER
        sync: false

  # =========================================
  # 2) courtflow-web — host-switched marketing site + portal SPAs (NO DB)
  #    Per-club theming by host reads club.branding (mirrors 1050 locker_room_app).
  #    Custom domains (nextpointtennis.com etc.) attached via the Render dashboard.
  # =========================================
  - type: web
    name: courtflow-web
    env: python
    plan: free          # pre-launch = $0 (sleeps when idle, ~30s cold start). Bump to "starter" at go-live.
    buildCommand: "pip install --upgrade pip && pip install flask gunicorn requests"
    startCommand: "gunicorn web_wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      # The /login page (Clerk widget). DARK until AUTH_ENABLED=1 + key set.
      - key: AUTH_ENABLED
        value: "1"
      - key: CLERK_PUBLISHABLE_KEY
        value: "pk_test_c2V0dGxpbmctYWxpZW4tMjMuY2xlcmsuYWNjb3VudHMuZGV2JA"  # CourtFlow Clerk dev app; public
      - key: AUTH_AFTER_LOGIN_URL
        value: "/portal"
      # Backend that verifies the Clerk token from /login (the whoami check).
      - key: AUTH_API_BASE
        value: "https://courtflow-api.onrender.com"
      # Marketing hosts → these serve the public site at "/" (app stays at /portal).
      # Includes the onrender URL so the public site is viewable before DNS cutover;
      # the real domains are here too (also in branding.py registry) for go-live.
      - key: MARKETING_HOSTS
        value: "courtflow-web.onrender.com,nextpointtennis.com,www.nextpointtennis.com"

  # =========================================
  # Crons — DEFERRED (not created at launch; nothing depends on them yet).
  # Each only matters once its feature is live: reminders (sending booking reminders),
  # capacity-sweep (releasing online-payment holds + promoting waitlists), monthly-invoice
  # (month-end account statements), membership-refill (recurring memberships). Add them back
  # by uncommenting when those features ship — the handlers + crons/trigger.py already exist.
  # Render crons run `python -m crons.trigger <job>` with CRON_API_BASE + OPS_KEY set.
  # =========================================
  # - type: cron
  #   name: courtflow-cron-reminders
  #   env: python
  #   plan: starter
  #   schedule: "0 6 * * *"
  #   buildCommand: "pip install --upgrade pip && pip install requests"
  #   startCommand: "python -m crons.trigger reminders"
  #   envVars:
  #     - { key: CRON_API_BASE, sync: false }
  #     - { key: OPS_KEY, sync: false }
  # (capacity-sweep "*/15 * * * *", monthly-invoice "0 5 1 * *", membership-refill "0 4 * * *"
  #  follow the same shape — see git history of this file for the full block.)

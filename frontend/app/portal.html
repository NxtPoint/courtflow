<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NextPoint · Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/_shared/portal.css" onerror="this.remove()">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="cf-shell">
  <header id="cf-topbar" class="cf-topbar"></header>
  <main id="cf-main" class="cf-main">
    <div class="cf-loading">Loading…</div>
  </main>
</div>

<script src="/js/auth_client.js"></script>
<script src="/js/ui.js"></script>
<!-- crm_ui.js = the shared CRMUI.* render layer. home.js uses CRMUI.rescheduleModal (the ONE
     reschedule widget), so it must load here, after ui.js and before home.js. -->
<script src="/js/crm_ui.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin_api.js"></script>
<script src="/js/coach_api.js"></script>
<script src="/js/portal.js"></script>
<script src="/js/pay.js"></script>
<script src="/js/wizard.js"></script>
<script src="/js/home.js"></script>
<script>
// The client ONE-PAGE Home (front-end redesign): a sticky chip nav over four sections —
// Book · My Bookings · Profile · Money (home.js). Everyone gets the same Home; staff also see
// console links in the Book section + their Coach/Admin nav. First-run owners/coaches are sent
// to their onboarding wizard before the page renders.
Portal.boot({
  active: "/portal.html",
  onReady: async function (p) {
    if (p.role === "club_admin" || p.role === "platform_admin") {
      try { var ob = await window.AdminAPI.onboarding(); if (ob && !ob.completed) { window.location.replace("/onboarding.html"); return; } } catch (e) {}
    } else if (p.role === "coach") {
      try { var cob = await window.CoachAPI.onboarding(); if (cob && !cob.completed) { window.location.replace("/coach-onboarding.html"); return; } } catch (e) {}
    }
    window.Home.start(p);
  },
});
</script>
</body>
</html>

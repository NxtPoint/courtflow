<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NextPoint · Book</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/_shared/portal.css" onerror="this.remove()">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="cf-shell">
  <header id="cf-topbar" class="cf-topbar"></header>
  <main id="cf-main" class="cf-main">
    <div class="cf-loading">Loading…</div>
  </main>
</div>

<script src="/js/auth_client.js"></script>
<script src="/js/pay.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/api.js"></script>
<script src="/js/portal.js"></script>
<script src="/js/booking.js"></script>
<script>
// Full-screen booking flow (booking.js). Service comes from the URL — /book/court|lesson|class
// (dashboard deep-links) or ?service=court — defaulting to court; an in-page switch changes it.
(function () {
  function serviceFromUrl() {
    var m = (location.pathname || "").match(/\/book\/(court|lesson|class)\b/);
    if (m) return m[1];
    var q = new URLSearchParams(location.search).get("service");
    return (q === "court" || q === "lesson" || q === "class") ? q : "court";
  }
  Portal.boot({
    active: "/book.html",
    onReady: function (p) { window.BookFlow.start(p, serviceFromUrl()); },
  });
})();
</script>
</body>
</html>

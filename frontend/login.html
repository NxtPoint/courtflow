<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Sign in · __CLUB_NAME__</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Themed by host: web_app injects #cf-theme with --primary/--accent/--ink. -->
<link rel="stylesheet" href="/shared/theme.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh;
         background:var(--bg); padding:24px 24px 80px; }
  .wrap { width:100%; max-width:440px; }
  .brand { text-align:center; margin-bottom:22px; }
  .brand .logo { font-size:22px; font-weight:800; letter-spacing:-.02em; color:var(--primary-d); }
  .brand .tag { margin-top:4px; font-size:13px; color:var(--muted); }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:16px;
          box-shadow:0 8px 30px rgba(20,60,40,.06); padding:28px; }
  #clerk-auth { min-height:360px; display:flex; align-items:center; justify-content:center; }
  .state { text-align:center; color:var(--muted); font-size:14px; line-height:1.6; padding:24px 8px; }
  .state h2 { color:var(--ink); font-size:17px; margin:0 0 8px; }
  .state a { color:var(--primary-d); font-weight:600; }
  .spinner { width:26px; height:26px; border:3px solid var(--line); border-top-color:var(--primary);
             border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .foot { text-align:center; margin-top:18px; font-size:12px; color:var(--muted); }
  .foot a { color:var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">__CLUB_NAME__</div>
      <div class="tag">Sign in to book courts, lessons and classes</div>
    </div>
    <div class="card">
      <div id="clerk-auth">
        <div class="state"><div class="spinner"></div>Loading sign-in…</div>
      </div>
    </div>
    <div class="foot">Trouble signing in? <a href="mailto:__SUPPORT_EMAIL__">__SUPPORT_EMAIL__</a></div>
  </div>

<script>
// ============================================================
// Clerk-backed login/signup for CourtFlow (the public "login door"). Config is
// injected SERVER-SIDE by the /login route from env (all public values):
//   __CLERK_PUBLISHABLE_KEY__  -> CLERK_PUBLISHABLE_KEY (pk_test_… / pk_live_…)
//   __AUTH_AFTER_LOGIN__       -> where to go after sign-in (default /portal)
//   __AUTH_ENABLED__           -> "1" to actually run Clerk; else a "being set up" notice
//   __AUTH_API_BASE__          -> courtflow-api base for the whoami check
// Dark until AUTH_ENABLED=1 + a real key, so this page is safe to ship live.
// Social (Google) + email are configured in the Clerk dashboard and appear here
// automatically. On success we forward to the portal (Agent E's app).
// ============================================================
const CFG = {
  publishableKey: "__CLERK_PUBLISHABLE_KEY__",
  afterLogin:     "__AUTH_AFTER_LOGIN__",
  enabled:        "__AUTH_ENABLED__",
  apiBase:        "__AUTH_API_BASE__",
  support:        "__SUPPORT_EMAIL__",
};
const mount = document.getElementById("clerk-auth");
function showNotice(t, h){ mount.innerHTML='<div class="state"><h2>'+t+'</h2><div>'+h+'</div></div>'; }
function isConfigured(k){ return !!k && k.indexOf("__CLERK")!==0 && /^pk_(test|live)_/.test(k); }
function frontendApiFromKey(k){ try{ return atob(k.split("_").slice(2).join("_")).replace(/\$+$/,""); }catch(e){ return null; } }

function boot(){
  if (CFG.enabled !== "1"){
    showNotice("Sign-in is being set up",
      "Our new sign-in isn't live yet. Please check back shortly, or " +
      '<a href="mailto:'+CFG.support+'">contact us</a>.');
    return;
  }
  if (!isConfigured(CFG.publishableKey)){
    showNotice("Sign-in is being set up",
      "We're finishing configuration. Please check back shortly, or " +
      '<a href="mailto:'+CFG.support+'">contact us</a>.');
    return;
  }
  const host = frontendApiFromKey(CFG.publishableKey);
  if (!host){ showNotice("Sign-in unavailable","Configuration error — please contact support."); return; }
  const s = document.createElement("script");
  s.async = true; s.crossOrigin = "anonymous";
  s.setAttribute("data-clerk-publishable-key", CFG.publishableKey);
  s.src = "https://" + host + "/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
  s.addEventListener("error", function(){ showNotice("Sign-in unavailable","Couldn't reach the sign-in service. Please retry shortly."); });
  s.addEventListener("load", initClerk);
  document.head.appendChild(s);
}

async function initClerk(){
  try {
    const Clerk = window.Clerk;
    await Clerk.load();
    if (Clerk.user){ verifyWithBackend(Clerk); return; }
    mount.innerHTML = "";
    Clerk.mountSignIn(mount, {
      signUpUrl: "/login#/sign-up",
      forceRedirectUrl: "/login",
      signUpForceRedirectUrl: "/login",
    });
    Clerk.addListener(function(e){ if (e && e.user) verifyWithBackend(Clerk); });
  } catch (err) {
    showNotice("Sign-in unavailable","Something went wrong loading sign-in. Please retry shortly.");
  }
}

// Verify the Clerk session against courtflow-api, then forward to the portal.
async function verifyWithBackend(Clerk){
  mount.innerHTML = '<div class="state"><div class="spinner"></div>Verifying your account…</div>';
  const email = (Clerk.user && Clerk.user.primaryEmailAddress && Clerk.user.primaryEmailAddress.emailAddress) || "";
  try {
    const token = await Clerk.session.getToken();
    const base = (CFG.apiBase && CFG.apiBase.indexOf("__")!==0) ? CFG.apiBase : "";
    const res = await fetch(base + "/api/whoami", { headers: { "Authorization": "Bearer " + token } });
    const data = await res.json().catch(function(){ return {}; });
    if (res.ok && data && data.user_id){
      // Authorised — straight into the portal.
      window.location.replace(CFG.afterLogin || "/portal");
    } else if (res.status === 401 || res.status === 403){
      mount.innerHTML =
        '<div class="state"><h2>Almost there</h2><div>Signed in as <b>'+email+'</b>, but the backend ' +
        "couldn't authorise the token (HTTP "+res.status+"). If you just set up Clerk, add an " +
        "<code>email</code> claim to the session token, then sign out and back in.</div>" +
        '<div style="margin-top:14px"><a href="#" id="signout">Sign out</a></div></div>';
    } else {
      mount.innerHTML =
        '<div class="state"><h2>Couldn&rsquo;t verify</h2><div>Unexpected response (HTTP '+res.status+'). ' +
        'Please retry, or <a href="mailto:'+CFG.support+'">contact us</a>.</div>' +
        '<div style="margin-top:14px"><a href="#" id="signout">Sign out</a></div></div>';
    }
  } catch (err) {
    mount.innerHTML =
      '<div class="state"><h2>Couldn&rsquo;t reach the server</h2><div>Signed in as <b>'+email+'</b>, but the ' +
      'verification call failed. Please retry shortly.</div>' +
      '<div style="margin-top:14px"><a href="#" id="signout">Sign out</a></div></div>';
  }
  var so = document.getElementById("signout");
  if (so) so.addEventListener("click", function(ev){
    ev.preventDefault();
    if (window.Clerk && window.Clerk.signOut) window.Clerk.signOut().then(function(){ location.reload(); });
  });
}
boot();
</script>
</body>
</html>

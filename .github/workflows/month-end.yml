# month-end — fire the OPS-only monthly statement sweep on the 25th of each month (the club's
# billing day). Accrues coach arrears + rent, consolidates each client's OPEN orders into ONE
# numbered statement invoice + emails it with a pay link (else a plain balance reminder).
# Idempotent per (club,user,period=YYYY-MM), so a re-run never re-issues/re-notifies; the next
# month's run (a new period) picks up anything still open. Free (GitHub Actions) — no always-on
# Render cron needed (all four render.yaml crons stay commented out; rides the keep-warm CI pattern).
# 08:00 SAST is inside the keep-warm window, so the API is awake when it fires.
#
# REQUIRES a repository secret OPS_KEY set to the SAME value as the API service's OPS_KEY env var
# (Settings → Secrets and variables → Actions). Without it the job no-ops (it won't fail the run).
name: month-end

on:
  schedule:
    - cron: "0 6 25 * *"    # 06:00 UTC (08:00 SAST) on the 25th of each month — the billing day
  workflow_dispatch:
    inputs:
      period:
        description: "Period YYYY-MM to sweep (blank = current month)"
        required: false
        default: ""

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Fire the month-end statement sweep
        env:
          OPS_KEY: ${{ secrets.OPS_KEY }}
          PERIOD: ${{ github.event.inputs.period }}
        run: |
          if [ -z "$OPS_KEY" ]; then
            echo "OPS_KEY secret not set — skipping the sweep (add it in repo Settings → Secrets)."
            exit 0
          fi
          curl -fsS --max-time 120 -X POST \
            https://courtflow-api.onrender.com/api/cron/month-end \
            -H "X-Ops-Key: $OPS_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"period\": \"${PERIOD}\"}" \
          || echo "month-end sweep call failed (idempotent — safe to re-run from the Actions tab)."

# marketing-canary — the tripwire for silent marketing-measurement regressions.
#
# WHY THIS EXISTS: on 2026-07-18 we discovered the Google tag (GA4 + Ads conversions) had
# been DARK on the live site for ~a week. Root cause: render.yaml committed the tag IDs as
# blank value:"", so a routine blueprint sync reset them to empty and web_app._google_tag_head()
# rendered nothing. GA4 key-events + purchases went to 0 and Ads had no conversion signal to
# optimise on — and NOTHING told us. This canary makes that class of failure loud.
#
# It fetches the LIVE public site and asserts the marketing plumbing is actually present in the
# served HTML. If any check fails the job exits non-zero, which GitHub emails to the repo owner
# (and shows red in the Actions tab). Free, no infra, rides the keep-warm.yml pattern.
#
# Extend it as the engine grows (more asserts = more coverage). Keep checks CHEAP + PUBLIC —
# this only reads pages any visitor can see; it never needs secrets.
name: marketing-canary

on:
  schedule:
    # Every 2 hours, 06:00–20:00 UTC (08:00–22:00 SAST). Frequent enough to catch a bad
    # deploy the same day; cheap enough to ignore. GitHub cron is UTC.
    - cron: "0 6-20/2 * * *"
  workflow_dispatch: {}   # run on demand from the Actions tab (e.g. right after a deploy)

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Assert the Google tag + marketing plumbing is live on nextpointtennis.com
        run: |
          set -euo pipefail
          SITE="https://nextpointtennis.com/"
          echo "Fetching $SITE"
          HTML="$(curl -fsS -A 'marketing-canary' --max-time 90 "$SITE")"

          fail=0
          assert() {  # assert <label> <string-that-must-be-present>
            if printf '%s' "$HTML" | grep -qF -- "$2"; then
              echo "  ok   : $1"
            else
              echo "  FAIL : $1  (missing: $2)"
              fail=1
            fi
          }

          # --- The Google tag (this is what went dark) ---
          assert "GA4 measurement ID present"       "G-EKQP47P8M9"
          assert "Google Ads global tag present"    "AW-17077631191"
          assert "gtag.js loader present"           "googletagmanager.com/gtag/js"
          assert "Ads conversion map present"       "adsConversions"
          # --- Conversion + attribution wiring ---
          assert "cfConversion helper present"      "cfConversion"
          assert "attribution.js (gclid capture)"   "attribution.js"

          # --- SEO canary: sitemap must be reachable (feeds Search Console) ---
          echo "Checking sitemap.xml ..."
          if curl -fsS -A 'marketing-canary' --max-time 60 "https://nextpointtennis.com/sitemap.xml" -o /dev/null; then
            echo "  ok   : sitemap.xml reachable"
          else
            echo "  FAIL : sitemap.xml not reachable"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::Marketing canary FAILED — the live site is missing marketing plumbing (see FAIL lines above). Most likely a blueprint sync blanked the tag IDs, or a frontend deploy dropped the head injection."
            exit 1
          fi
          echo "All marketing canary checks passed."

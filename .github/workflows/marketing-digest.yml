# marketing-digest — the daily cross-brand organic-growth report (GA4 + Search Console).
#
# Authenticates KEYLESS via Workload Identity Federation (no service-account key — the org
# security policy blocks key downloads, so GitHub's OIDC token is exchanged for short-lived
# access to the `marketing-engine` service account). The service account reads whatever GA4
# properties + Search Console sites it has been granted (NextPoint + Ten-Fifty5), and the run
# writes a Markdown digest to marketing_digest/reports/ + the Actions step summary.
#
# Coverage is controlled by the per-property GRANTS in the GA4/GSC consoles, not by code —
# add a brand there and it appears here automatically.
name: marketing-digest

on:
  schedule:
    - cron: "0 5 * * *"    # 07:00 SAST daily (GitHub cron is UTC)
  workflow_dispatch: {}      # run on demand from the Actions tab

permissions:
  contents: write            # commit the report back to the repo
  id-token: write            # required for Workload Identity Federation (OIDC)

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Keyless Google auth — exchanges the GitHub OIDC token for SA access. No secrets.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/329900503340/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "marketing-engine@marketing-engine-502809.iam.gserviceaccount.com"

      - name: Install deps
        run: pip install -r marketing_digest/requirements.txt

      - name: Build digest
        run: python marketing_digest/digest.py

      - name: Commit report
        run: |
          git config user.name "marketing-digest"
          git config user.email "actions@users.noreply.github.com"
          git add marketing_digest/reports/ || true
          if git diff --cached --quiet; then
            echo "no report changes"
          else
            git commit -m "chore(marketing): daily digest $(date -u +%F)"
            git push
          fi
